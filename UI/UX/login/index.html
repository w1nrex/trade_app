<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade App</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <header class="app-title">Trade App</header>

    <form class="container" id="loginForm" novalidate>
        <div class="login">
            <span class="title">Login</span>
        </div>

        <div class="input-container">
            <input class="input-field" type="text" id="username" placeholder="Username" required>
        </div>

        <div class="input-container">
            <input class="input-field" type="password" id="password" placeholder="Password" required>
        </div>

        <div class="forgot">
            <section>
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </section>
            <section>
                <a href="#">Forgot password?</a>
            </section>
        </div>

        <button class="btn" type="submit">Submit</button>
    </form>
</body>
</html>
